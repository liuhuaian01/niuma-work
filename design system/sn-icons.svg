<svg xmlns="http://www.w3.org/2000/svg" style="display:none">

  <!-- ============================================================
       Super Niuma Icon System
       "创作脉冲" (Creative Pulse) — geometric, precise, energetic
       ViewBox: 24×24  |  Stroke: 1.5px  |  Cap: round  |  Join: round
       Usage: <svg><use href="#icon-NAME"/></svg>
       ============================================================ -->

  <!-- 01 — create / new: vertical pulse line with accent dot at top -->
  <symbol id="icon-create" viewBox="0 0 24 24">
    <line x1="12" y1="20" x2="12" y2="6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
    <circle cx="12" cy="3.5" r="2" stroke="currentColor" stroke-width="1.5" fill="none"/>
    <line x1="8" y1="13" x2="16" y2="13" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
  </symbol>

  <!-- 02 — search: open circle with diagonal probe line -->
  <symbol id="icon-search" viewBox="0 0 24 24">
    <circle cx="10.5" cy="10.5" r="6.5" stroke="currentColor" stroke-width="1.5" fill="none"/>
    <line x1="15.5" y1="15.5" x2="21" y2="21" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
  </symbol>

  <!-- 03 — settings: central circle with 4 radial lines (abstract cog) -->
  <symbol id="icon-settings" viewBox="0 0 24 24">
    <circle cx="12" cy="12" r="4.5" stroke="currentColor" stroke-width="1.5" fill="none"/>
    <line x1="12" y1="2"  x2="12" y2="6"  stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="12" y1="18" x2="12" y2="22" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="2"  y1="12" x2="6"  y2="12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="18" y1="12" x2="22" y2="12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
  </symbol>

  <!-- 04 — close / exit: diagonal cross -->
  <symbol id="icon-close" viewBox="0 0 24 24">
    <line x1="5" y1="5" x2="19" y2="19" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="19" y1="5" x2="5" y2="19" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
  </symbol>

  <!-- 05 — command / terminal: chevron prompt + cursor -->
  <symbol id="icon-terminal" viewBox="0 0 24 24">
    <polyline points="8,7 4,12 8,17" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <line x1="11" y1="17" x2="18" y2="17" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
  </symbol>

  <!-- 06 — workspace: 2×2 node grid with connecting lines -->
  <symbol id="icon-workspace" viewBox="0 0 24 24">
    <rect x="2" y="2" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="1.5" fill="none"/>
    <rect x="15" y="2" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="1.5" fill="none"/>
    <rect x="2" y="15" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="1.5" fill="none"/>
    <rect x="15" y="15" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="1.5" fill="none"/>
  </symbol>

  <!-- 07 — files: two offset document shapes -->
  <symbol id="icon-files" viewBox="0 0 24 24">
    <path d="M5 3h9l5 5v13a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round" fill="none"/>
    <path d="M14 3v5h5" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round" fill="none"/>
    <line x1="7" y1="13" x2="15" y2="13" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="7" y1="17" x2="12" y2="17" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
  </symbol>

  <!-- 08 — chat / message: speech bubble (rounded rect + tail) -->
  <symbol id="icon-chat" viewBox="0 0 24 24">
    <path d="M4 6a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v10a2 2 0 0 1-2 2h-6l-4 3v-3H6a2 2 0 0 1-2-2V6z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round" fill="none"/>
  </symbol>

  <!-- 09 — layers / depth: three staggered parallel lines (perspective) -->
  <symbol id="icon-layers" viewBox="0 0 24 24">
    <line x1="4" y1="8"  x2="20" y2="8"  stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="6" y1="12" x2="22" y2="12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="8" y1="16" x2="24" y2="16" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
    <circle cx="4" cy="8" r="1" fill="currentColor"/>
    <circle cx="6" cy="12" r="1" fill="currentColor"/>
    <circle cx="8" cy="16" r="1" fill="currentColor"/>
  </symbol>

  <!-- 10 — pulse / energy: concentric quarter-arcs radiating -->
  <symbol id="icon-pulse" viewBox="0 0 24 24">
    <circle cx="12" cy="12" r="1.5" fill="currentColor"/>
    <path d="M12 9 A4 4 0 0 1 17 14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" fill="none"/>
    <path d="M12 6 A8 8 0 0 1 22 16" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" fill="none"/>
  </symbol>

  <!-- 11 — expand / open: four outward-pointing chevrons from center -->
  <symbol id="icon-expand" viewBox="0 0 24 24">
    <circle cx="12" cy="12" r="2" fill="currentColor"/>
    <line x1="12" y1="2"  x2="12" y2="8"  stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="12" y1="16" x2="12" y2="22" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="2"  y1="12" x2="8"  y2="12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="16" y1="12" x2="22" y2="12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
  </symbol>

  <!-- 12 — collapse / close: four inward chevrons -->
  <symbol id="icon-collapse" viewBox="0 0 24 24">
    <circle cx="12" cy="12" r="2" fill="currentColor"/>
    <line x1="4"  y1="4"  x2="9"  y2="9"  stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="20" y1="4"  x2="15" y2="9"  stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="4"  y1="20" x2="9"  y2="15" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="20" y1="20" x2="15" y2="15" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
  </symbol>

  <!-- 13 — bell / notification: arc top with vertical line + dot -->
  <symbol id="icon-notification" viewBox="0 0 24 24">
    <path d="M7 10a5 5 0 0 1 10 0v4l2 2H5l2-2v-4z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round" fill="none"/>
    <line x1="12" y1="2" x2="12" y2="5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
    <circle cx="18" cy="6" r="2" stroke="currentColor" stroke-width="1.5" fill="none"/>
  </symbol>

  <!-- 14 — more / menu: three horizontal dots (kebab) -->
  <symbol id="icon-more" viewBox="0 0 24 24">
    <circle cx="12" cy="5" r="1.5" fill="currentColor"/>
    <circle cx="12" cy="12" r="1.5" fill="currentColor"/>
    <circle cx="12" cy="19" r="1.5" fill="currentColor"/>
  </symbol>

  <!-- 15 — arrow-right: simple chevron with trail -->
  <symbol id="icon-arrow-right" viewBox="0 0 24 24">
    <line x1="3" y1="12" x2="19" y2="12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
    <polyline points="14,7 20,12 14,17" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </symbol>

  <!-- 16 — home: minimal geometric house -->
  <symbol id="icon-home" viewBox="0 0 24 24">
    <path d="M3 10l9-7 9 7v11a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V10z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round" fill="none"/>
    <line x1="9" y1="22" x2="9" y2="14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="15" y1="22" x2="15" y2="14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
  </symbol>

</svg>
